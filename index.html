<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>プロモ資料</title>

  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;

      /* グレージュ背景 */
      background: #d6d0c4;

      color: #fff;
    }

    .promo-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .promo-card {
      width: min(100%, 520px);
      padding: 56px 40px;
      border-radius: 24px;

      /* ネイビー */
      background: #0f1c2e;

      text-align: center;

      /* ちょい高級感 */
      box-shadow: 0 24px 80px rgba(0,0,0,.25);
    }

    .label {
      margin: 0 0 20px;
      font-size: 12px;
      letter-spacing: .18em;
      color: rgba(255,255,255,.6);
    }

    h1 {
      margin: 0;
      font-size: clamp(42px, 8vw, 72px);
      line-height: .95;
      letter-spacing: -0.04em;
      color: #fff;
    }

    .text {
      margin: 28px 0 36px;
      color: rgba(255,255,255,.8);
      line-height: 1.8;
    }

    .promo-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 180px;
      padding: 15px 28px;

      border-radius: 999px;

      /* 枠ボタンに変更（白抜き） */
      border: 1px solid #fff;
      background: transparent;

      color: #fff;
      text-decoration: none;
      font-weight: 700;

      transition: .25s ease;
    }

    .promo-btn:hover {
      background: #fff;
      color: #0f1c2e;
      transform: translateY(-2px);
    }

    /* スマホ */
    @media screen and (max-width: 767px) {
      .promo-page {
        padding: 20px;
      }

      .promo-card {
        padding: 44px 24px;
        border-radius: 20px;
      }

      h1 {
        font-size: clamp(42px, 14vw, 58px);
      }

      .text {
        margin: 24px 0 32px;
        font-size: 14px;
      }

      .promo-btn {
        width: 100%;
        max-width: 240px;
        margin: auto;
      }
    }
  </style>
</head>

<body>

<div class="promo-page">
  <div class="promo-card">
    <p class="label">Lohb Promotional Material</p>

    <p class="text">
      最新のプロモーション資料はこちらからご確認ください。
    </p>

    <a href="./promo.pdf" target="_blank" class="promo-btn">
      View PDF
    </a>
  </div>
</div>

</body>
</html>
