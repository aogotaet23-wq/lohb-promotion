<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>プロモ資料</title>
  <style>
    body {
  margin: 0;
  font-family: "Helvetica Neue", Arial, sans-serif;
  background:
    radial-gradient(circle at top left, rgba(255,255,255,.12), transparent 35%),
    linear-gradient(135deg, #0e0e0e, #1b1b1b);
  color: #fff;
}

.promo-page {
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 24px;
}

.promo-card {
  width: min(100%, 520px);
  padding: 56px 40px;
  border: 1px solid rgba(255,255,255,.18);
  border-radius: 24px;
  background: rgba(255,255,255,.06);
  backdrop-filter: blur(16px);
  text-align: center;
  box-shadow: 0 24px 80px rgba(0,0,0,.35);
}

.label {
  margin: 0 0 20px;
  font-size: 12px;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: rgba(255,255,255,.6);
}

h1 {
  margin: 0;
  font-size: clamp(42px, 8vw, 72px);
  line-height: .95;
  letter-spacing: -0.04em;
}

.text {
  margin: 28px 0 36px;
  color: rgba(255,255,255,.72);
  line-height: 1.8;
}

.promo-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 180px;
  padding: 15px 28px;
  border-radius: 999px;
  background: #fff;
  color: #111;
  text-decoration: none;
  font-weight: 700;
  transition: .25s ease;
}

.promo-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 32px rgba(255,255,255,.18);
}
@media screen and (max-width: 767px) {
  .promo-page {
    padding: 20px;
    margin: 0 30px;
  }

  .promo-card {
    width: 100%;
    padding: 44px 24px;
    border-radius: 20px;
  }

  .label {
    margin-bottom: 18px;
    font-size: 10px;
    letter-spacing: 0.16em;
  }

  h1 {
    font-size: clamp(42px, 14vw, 58px);
    line-height: 0.95;
  }

  .text {
    margin: 24px 0 32px;
    font-size: 14px;
    line-height: 1.8;
  }

  .promo-btn {
    width: 100%;
    max-width: 240px;
    padding: 15px 24px;
    font-size: 14px;
    margin: auto;
  }
}
    </style>
</head>
<body>

<div class="promo-page">
  <div class="promo-card">
    <p class="label">Lohb Promotional Material</p>
    <p class="text">
      最新のプロモーション資料はこちらからご確認ください。
    </p>

    <a href="./promo.pdf" target="_blank" class="promo-btn">
      View PDF
    </a>
  </div>
</div>

</body>
</html>
